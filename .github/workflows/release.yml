name: Release

# Multi-platform validation before release.
# Tests on Windows, macOS, Linux to ensure cross-platform correctness.

on:
  push:
    tags:
      - 'v*'

jobs:
  # Test on all platforms before releasing
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Build
        run: dotnet build --configuration Release

      - name: Test
        run: dotnet test --configuration Release

  # Build papers via the reusable draft-paper workflow
  papers:
    uses: ./.github/workflows/draft-paper.yml

  # Publish NuGet package (parallel with papers, only needs tests)
  publish-library:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Build
        run: dotnet build --configuration Release

      - name: Pack NuGet package
        run: dotnet pack src/Encodings/Encodings.fsproj --configuration Release --no-build -o nupkg

      - name: Publish to NuGet
        run: dotnet nuget push nupkg/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Upload NuGet package
        uses: actions/upload-artifact@v4
        with:
          name: nuget-package-release
          path: nupkg/*.nupkg

  # Create GitHub Release with all artifacts
  create-release:
    needs: [publish-library, papers]
    runs-on: ubuntu-latest
    steps:
      - name: Download NuGet package
        uses: actions/download-artifact@v4
        with:
          name: nuget-package-release
          path: artifacts/

      - name: Download JOSS paper
        uses: actions/download-artifact@v4
        with:
          name: joss-paper
          path: artifacts/

      - name: Download review paper
        uses: actions/download-artifact@v4
        with:
          name: review-paper
          path: artifacts/

      - name: Download explainer paper
        uses: actions/download-artifact@v4
        with:
          name: explainer-paper
          path: artifacts/

      - name: Rename paper PDFs
        run: |
          mv artifacts/paper.pdf artifacts/fockmap-joss.pdf

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.nupkg
            artifacts/fockmap-joss.pdf
            artifacts/fockmap-review.pdf
            artifacts/fockmap-explainer.pdf
