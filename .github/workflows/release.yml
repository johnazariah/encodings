name: Release

# Multi-platform validation before release.
# Tests on Windows, macOS, Linux to ensure cross-platform correctness.

on:
  push:
    tags:
      - 'v*'

jobs:
  # Test on all platforms before releasing
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Build
        run: dotnet build --configuration Release

      - name: Test
        run: dotnet test --configuration Release

  # Only publish after all platforms pass
  publish:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install LaTeX toolchain
        run: |
          sudo apt-get update && sudo apt-get install -y --no-install-recommends \
            latexmk \
            texlive-latex-extra \
            texlive-fonts-recommended \
            texlive-science \
            texlive-publishers \
            lmodern

      - name: Build
        run: dotnet build --configuration Release

      - name: Pack NuGet package
        run: dotnet pack src/Encodings/Encodings.fsproj --configuration Release --no-build -o nupkg

      - name: Build JOSS paper (Markdown → PDF via Open Journals)
        uses: openjournals/openjournals-draft-action@master
        with:
          journal: joss
          paper-path: .project/research/paper-software/paper.md

      - name: Build review paper (LaTeX → PDF)
        run: make -C .project/research review || true
        # latexmk returns non-zero due to REVTeX journal abbreviation warnings in bibtex;
        # verify the PDF was actually produced
      - name: Verify review paper PDF
        run: test -f .project/research/paper-review/fockmap-review.pdf

      - name: Build explainer paper (LaTeX → PDF)
        run: make -C .project/research explainer || true
      - name: Verify explainer paper PDF
        run: test -f .project/research/paper-explainer/fockmap-explainer.pdf

      - name: Copy release PDFs with unique names
        run: |
          cp .project/research/paper-software/paper.pdf .project/research/fockmap-joss.pdf
          cp .project/research/paper-review/fockmap-review.pdf .project/research/fockmap-review.pdf
          cp .project/research/paper-explainer/fockmap-explainer.pdf .project/research/fockmap-explainer.pdf

      - name: Publish to NuGet
        run: dotnet nuget push nupkg/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            nupkg/*.nupkg
            .project/research/fockmap-joss.pdf
            .project/research/fockmap-review.pdf
            .project/research/fockmap-explainer.pdf
