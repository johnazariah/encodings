name: Draft JOSS Paper

on:
  push:
    paths:
      - '.project/research/paper-software/**'
      - '.project/research/shared/bibliography/**'
      - '.github/workflows/draft-paper.yml'
  pull_request:
    paths:
      - '.project/research/paper-software/**'
      - '.project/research/shared/bibliography/**'

jobs:
  paper:
    runs-on: ubuntu-latest
    name: Build JOSS paper PDF
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build draft PDF
        uses: openjournals/openjournals-draft-action@master
        with:
          journal: joss
          paper-path: .project/research/paper-software/paper.md

      - name: Upload paper PDF
        uses: actions/upload-artifact@v4
        with:
          name: joss-paper
          path: .project/research/paper-software/paper.pdf
